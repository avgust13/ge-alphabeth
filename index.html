<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Грузинский алфавит — тренажёр</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="meta">
        <span id="progress">Слово 1 / 1</span>
        <div class="top-actions">
          <button id="hintBtn" type="button">Подсказка буквы</button>
          <button id="nextBtn" type="button">Дальше</button>
        </div>
      </div>

      <div class="word-block">
        <div id="georgianWord" class="ge-word" aria-label="Грузинское слово"></div>
        <div id="inputsRow" class="inputs-row" aria-label="Поля для букв"></div>
        <div id="translation" class="translation" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
