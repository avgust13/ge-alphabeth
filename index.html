<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Грузинский алфавит — тренажёр</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Грузинский алфавит</h1>
      <p class="subtitle">Вводи буквы латиницей и учи написание</p>
    </header>

    <section class="card">
      <div class="meta">
        <span id="progress">Слово 1 / 1</span>
        <button id="hintBtn" type="button">Подсказка буквы</button>
      </div>

      <div class="word-block">
        <div id="georgianWord" class="ge-word" aria-label="Грузинское слово"></div>
        <div id="inputsRow" class="inputs-row" aria-label="Поля для букв"></div>
      </div>

      <div class="meaning">
        <p><strong>Похоже на:</strong> <span id="similarity"></span></p>
        <p><strong>Значение:</strong> <span id="meaning"></span></p>
      </div>

      <div class="actions">
        <button id="prevBtn" type="button">← Предыдущее</button>
        <button id="nextBtn" type="button">Следующее →</button>
      </div>
    </section>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
